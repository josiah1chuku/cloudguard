name: CloudGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import sklearn; print('scikit-learn', sklearn.__version__)"
          python -c "import xgboost; print('xgboost', xgboost.__version__)"
          python -c "import imblearn; print('imbalanced-learn', imblearn.__version__)"
          python -c "import pandas; print('pandas', pandas.__version__)"
          python -c "import numpy; print('numpy', numpy.__version__)"

      - name: Verify config loads
        run: python -c "import config; print('Config loaded OK')"

      - name: Verify pipeline modules import
        run: |
          python -c "from src.utils.helpers import setup_logger; print('helpers OK')"
          python -c "from src.data.download_datasets import download_azure_policy_definitions; print('download OK')"

  iac-security-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check for IaC security regressions
        run: |
          echo "Scanning Terraform and Bicep files for PCR-reducing changes..."
          if find . -name "*.tf" -o -name "*.bicep" | xargs grep -l "allow_blob_public_access.*true" 2>/dev/null; then
            echo "FAIL: Public blob access enabled — CloudGuard PCR check failed"
            exit 1
          fi
          if find . -name "*.tf" | xargs grep -l 'source_address_prefix.*"\*"' 2>/dev/null; then
            echo "WARNING: Unrestricted NSG inbound rule detected"
          fi
          echo "IaC security gate passed"
